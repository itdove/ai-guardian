# Secret Redaction Patterns - Example Pattern Server File
#
# This file demonstrates how to configure secret redaction patterns via a pattern server.
# Format: TOML with support for comments and metadata
#
# Pattern Server Endpoint: /patterns/secrets/v1
# Last Updated: 2026-04-22
# Version: 1.0.0

[metadata]
version = "1.0.0"
updated_at = 2026-04-22T12:00:00Z
override_mode = "extend"  # "extend" = add to AI Guardian defaults, "replace" = use only these
source = "patterns.security.company.com"
description = "Enterprise secret redaction patterns"

# Enterprise-Specific API Keys
# Add your organization's custom API key formats here

[[patterns]]
regex = '(api-key-v2-[A-Za-z0-9]{40})'
strategy = "preserve_prefix_suffix"
secret_type = "Company API v2 Key"
added = "2026-04-22"
rationale = "New API key format introduced in Q2 2026"

[[patterns]]
regex = '(acme-corp-token-[A-Za-z0-9\-_]{40})'
strategy = "preserve_prefix_suffix"
secret_type = "ACME Corp Internal Token"
added = "2026-04-15"
rationale = "Internal service authentication token"

[[patterns]]
regex = '(svc-auth-[A-Za-z0-9]{32})'
strategy = "preserve_prefix_suffix"
secret_type = "Service Authentication Token"
added = "2026-03-01"
rationale = "Service-to-service authentication"

# Database Connection Strings
# Organization-specific database formats

[[patterns]]
regex = '(mongodb\+srv://[^:]+:)([^@]+)(@[^\s]+)'
strategy = "connection_string"
secret_type = "MongoDB Atlas Connection"
added = "2026-04-01"
rationale = "MongoDB Atlas URIs with authentication"

[[patterns]]
regex = '(snowflake://[^:]+:)([^@]+)(@[^\s]+)'
strategy = "connection_string"
secret_type = "Snowflake Connection"
added = "2026-04-10"
rationale = "Snowflake data warehouse connections"

# Internal Service Tokens
# Format: internal-svc-<service-name>-<random>

[[patterns]]
regex = '(internal-svc-[a-z]+-[A-Za-z0-9]{24})'
strategy = "preserve_prefix_suffix"
secret_type = "Internal Service Token"
added = "2026-04-22"
rationale = "Microservice authentication tokens"

# OAuth Tokens (Organization-Specific)

[[patterns]]
regex = '(oauth2-prod-[A-Za-z0-9\-_]{43})'
strategy = "preserve_prefix_suffix"
secret_type = "Production OAuth2 Token"
added = "2026-04-05"
rationale = "Production OAuth2 access tokens"

[[patterns]]
regex = '(oauth2-dev-[A-Za-z0-9\-_]{43})'
strategy = "preserve_prefix_suffix"
secret_type = "Development OAuth2 Token"
added = "2026-04-05"
rationale = "Development OAuth2 access tokens (lower sensitivity)"

# API Keys with Environment Prefix
# Format: <env>_api_key_<random>

[[patterns]]
regex = '(prod_api_key_[A-Za-z0-9]{32})'
strategy = "full_redact"
secret_type = "Production API Key"
added = "2026-04-20"
rationale = "Production keys require full redaction (high sensitivity)"

[[patterns]]
regex = '(staging_api_key_[A-Za-z0-9]{32})'
strategy = "preserve_prefix_suffix"
secret_type = "Staging API Key"
added = "2026-04-20"
rationale = "Staging keys can preserve format for debugging"

# Session Tokens

[[patterns]]
regex = '(session_token=[A-Za-z0-9+/]{40,}={0,2})'
strategy = "preserve_prefix_suffix"
secret_type = "Session Token (Cookie)"
added = "2026-03-15"
rationale = "HTTP cookie session tokens"

# Encryption Keys (Full Redaction Required)

[[patterns]]
regex = '(encryption_key:\s*)([A-Za-z0-9+/]{32,}={0,2})'
strategy = "full_redact"
secret_type = "Encryption Key"
added = "2026-04-01"
rationale = "Encryption keys require full redaction (critical security)"

[[patterns]]
regex = '(aes_key:\s*)([A-Fa-f0-9]{32,64})'
strategy = "full_redact"
secret_type = "AES Encryption Key"
added = "2026-04-01"
rationale = "AES keys must be fully redacted"

# License Keys

[[patterns]]
regex = '(license-key-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4})'
strategy = "preserve_prefix_suffix"
secret_type = "Software License Key"
added = "2026-03-20"
rationale = "Software license keys for internal tools"

# Webhook Secrets

[[patterns]]
regex = '(webhook_secret:\s*)([A-Za-z0-9]{40,})'
strategy = "preserve_prefix_suffix"
secret_type = "Webhook Secret"
added = "2026-04-18"
rationale = "Webhook signature verification secrets"

# Example: Override Mode = "replace"
# If you set override_mode = "replace" above, AI Guardian will use ONLY these patterns
# and ignore all built-in patterns. Use this when:
# 1. You want complete control over what secrets are detected
# 2. You have a standardized secret format across your organization
# 3. You want to reduce false positives from generic patterns
#
# With override_mode = "extend" (default), these patterns are ADDED to the 35+ built-in patterns.

# Pattern Strategies:
# - preserve_prefix_suffix: Keep first 6 + last 4 chars (e.g., "api-ke...1vwx")
# - full_redact: Replace entire secret with placeholder text
# - connection_string: Preserve schema and endpoint, redact password
# - env_assignment: Preserve variable name, redact value
# - json_field: Preserve field name and structure, redact value

# Best Practices:
# 1. Use full_redact for high-sensitivity secrets (encryption keys, prod tokens)
# 2. Use preserve_prefix_suffix for debugging support (API keys, dev tokens)
# 3. Add rationale field to document WHY each pattern exists
# 4. Update added field when patterns change
# 5. Increment version in metadata when making changes
