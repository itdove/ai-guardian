# Unicode Attack Detection Patterns - Example Pattern Server File
#
# This file demonstrates how to configure homoglyph patterns via a pattern server.
# Format: TOML with support for comments
#
# Pattern Server Endpoint: /patterns/unicode/v1
# Last Updated: 2026-04-22
# Version: 1.0.0
#
# Note: Zero-width characters and bidi overrides are IMMUTABLE (cannot be overridden)
# This file contains only homoglyph patterns that can be updated as new scripts emerge.

[metadata]
version = "1.0.0"
updated_at = 2026-04-22T14:00:00Z
source = "patterns.security.company.com"
description = "Enterprise homoglyph detection patterns"

# Cyrillic → Latin Homoglyphs
# Most common attack vector - Cyrillic letters that look like Latin

[[homoglyph_patterns]]
source = "а"  # U+0430 Cyrillic lowercase a
target = "a"  # U+0061 Latin lowercase a
script = "Cyrillic"
added = "2026-01-01"

[[homoglyph_patterns]]
source = "е"  # U+0435 Cyrillic lowercase ie
target = "e"  # U+0065 Latin lowercase e
script = "Cyrillic"
added = "2026-01-01"

[[homoglyph_patterns]]
source = "о"  # U+043E Cyrillic lowercase o
target = "o"  # U+006F Latin lowercase o
script = "Cyrillic"
added = "2026-01-01"

[[homoglyph_patterns]]
source = "р"  # U+0440 Cyrillic lowercase er
target = "p"  # U+0070 Latin lowercase p
script = "Cyrillic"
added = "2026-01-01"

[[homoglyph_patterns]]
source = "с"  # U+0441 Cyrillic lowercase es
target = "c"  # U+0063 Latin lowercase c
script = "Cyrillic"
added = "2026-01-01"

[[homoglyph_patterns]]
source = "у"  # U+0443 Cyrillic lowercase u
target = "y"  # U+0079 Latin lowercase y
script = "Cyrillic"
added = "2026-01-01"

[[homoglyph_patterns]]
source = "х"  # U+0445 Cyrillic lowercase ha
target = "x"  # U+0078 Latin lowercase x
script = "Cyrillic"
added = "2026-01-01"

