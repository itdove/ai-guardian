# Basic secret detection scenarios
events:
  - label: "AWS key in prompt"
    prompt: "my access key is AKIAIOSFODNN7EXAMPLE and secret is wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
    expect: block

  - label: "Clean prompt"
    prompt: "List the files in the current directory"
    tools:
      - name: Bash
        input: {command: "ls -la"}
        fake_output: "total 8\ndrwxr-xr-x  2 user user 4096 Jan 01 00:00 .\n"
    expect: allow

  - label: "GitHub token in tool output"
    prompt: "Show me the config"
    tools:
      - name: Read
        input: {file_path: "config.txt"}
        fake_output: "github_token=ghp_1234567890abcdefghijklmnopqrstuvwxyz12"
    expect: block
