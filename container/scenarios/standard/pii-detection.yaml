# yaml-language-server: $schema=../../../src/ai_guardian/schemas/scenario.schema.json
# PII detection scenarios — standard profile
# Standard profile: scan_pii.action=block — PII is blocked in prompts and tool output.
# No pii_redaction feature exists (unlike secret_redaction), so PII always blocks.
events:
  - label: "Credit card in prompt"
    prompt: "charge card 4111111111111111 expiry 12/26 cvv 123"
    expect: block

  - label: "Clean user prompt (no PII)"
    prompt: "help me write a function to sort a list"
    expect: allow

  - label: "Clean data processing"
    prompt: "summarize the sales report"
    tools:
      - name: Read
        input: {file_path: "report.csv"}
        fake_output: "region,total\nnorth,12000\nsouth,9500\n"
    expect: allow

  - label: "SSN in tool output"
    prompt: "read the user record"
    tools:
      - name: Read
        input: {file_path: "user.txt"}
        fake_output: "name: John Doe, ssn: 123-45-6789, dob: 1980-01-01"
    expect: block
