# yaml-language-server: $schema=../../../src/ai_guardian/schemas/scenario.schema.json
# SSRF protection scenarios — standard profile
# Standard profile: ssrf_protection.action=block — private IPs and metadata endpoints blocked.
events:
  - label: "SSRF curl to metadata endpoint"
    prompt: "get the instance metadata"
    tools:
      - name: Bash
        input: {command: "curl http://169.254.169.254/latest/meta-data/"}
    expect: block

  - label: "SSRF curl to private IP"
    prompt: "check internal service"
    tools:
      - name: Bash
        input: {command: "curl http://192.168.1.1/admin"}
    expect: block

  - label: "Clean curl to public URL"
    prompt: "fetch the api docs"
    tools:
      - name: Bash
        input: {command: "curl https://api.github.com/repos/octocat/hello-world"}
        fake_output: "{\"id\": 1}"
    expect: allow
