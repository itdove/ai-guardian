# yaml-language-server: $schema=../../../src/ai_guardian/schemas/scenario.schema.json
# Basic secret detection scenarios — standard profile
# Standard profile: secrets in tool output are redacted (secret_redaction.action=warn)
# and allowed through. Blocking only applies to prompts and commands (PreToolUse).
events:
  - label: "AWS access key in Read output (detected, redacted)"
    prompt: "show the config file"
    tools:
      - name: Read
        input: {file_path: "config.txt"}
        fake_output: "aws_access_key_id=AKIAQWERTY1234ZXCVBN\naws_secret=wJalrXUtnFEMI/K7MDENG/bPxRfiCYRANDOM12"
    expect: allow

  - label: "Clean Read output (no secret)"
    prompt: "show the readme"
    tools:
      - name: Read
        input: {file_path: "README.md"}
        fake_output: "# My Project\nA great project with no secrets.\n"
    expect: allow

  - label: "GitHub token in tool output (detected, redacted)"
    prompt: "Show me the config"
    tools:
      - name: Read
        input: {file_path: "config.txt"}
        fake_output: "github_token=ghp_1234567890abcdefghijklmnopqrstuvwxyz12"
    expect: allow
