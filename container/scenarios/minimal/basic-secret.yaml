# Basic secret detection scenarios — minimal profile
# Minimal profile: secrets in tool output are logged (secret_redaction.action=log-only)
# and allowed through. Blocking only applies to prompts and commands (PreToolUse).
events:
  - label: "AWS access key in Read output (detected, logged)"
    prompt: "show the config file"
    tools:
      - name: Read
        input: {file_path: "config.txt"}
        fake_output: "aws_access_key_id=AKIAQWERTY1234ZXCVBN\naws_secret=wJalrXUtnFEMI/K7MDENG/bPxRfiCYRANDOM12"
    expect: allow

  - label: "Clean prompt"
    prompt: "List the files in the current directory"
    tools:
      - name: Bash
        input: {command: "ls -la"}
        fake_output: "total 8\ndrwxr-xr-x  2 user user 4096 Jan 01 00:00 .\n"
    expect: allow

  - label: "GitHub token in tool output (detected, logged)"
    prompt: "Show me the config"
    tools:
      - name: Read
        input: {file_path: "config.txt"}
        fake_output: "github_token=ghp_1234567890abcdefghijklmnopqrstuvwxyz12"
    expect: allow
