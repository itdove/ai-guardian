# PII detection scenarios — moderator profile
# Moderator profile: action=ask — auto-dismisses in non-interactive CI → allow
events:
  - label: "Credit card in prompt (ask auto-dismissed in CI)"
    prompt: "charge card 4111111111111111 expiry 12/26 cvv 123"
    expect: allow

  - label: "Clean data processing"
    prompt: "summarize the sales report"
    tools:
      - name: Read
        input: {file_path: "report.csv"}
        fake_output: "region,total\nnorth,12000\nsouth,9500\n"
    expect: allow

  - label: "SSN in tool output (ask auto-dismissed in CI)"
    prompt: "read the user record"
    tools:
      - name: Read
        input: {file_path: "user.txt"}
        fake_output: "name: John Doe, ssn: 123-45-6789, dob: 1980-01-01"
    expect: allow
