# yaml-language-server: $schema=../../../src/ai_guardian/schemas/scenario.schema.json
# Secret scanning scenarios — strict profile
# Strict profile: secret_scanning.action=block everywhere; secret_redaction.enabled=false
# so secrets in tool output are also blocked (not just redacted).
events:
  - label: "AWS key in user prompt"
    prompt: "my key is AKIAQWERTY1234ZXCVBN and secret wJalrXUtnFEMI/K7MDENG/bPxRfiCYRANDOM12"
    expect: block

  - label: "Clean user prompt (no secret)"
    prompt: "help me summarize the quarterly report"
    expect: allow

  - label: "GitHub token in Read output (detected, redacted)"
    prompt: "show the config"
    tools:
      - name: Read
        input: {file_path: "config.txt"}
        fake_output: "github_token=ghp_1234567890abcdefghijklmnopqrstuvwxyz12"
    # TODO: change to expect: block once quay.io image is rebuilt with strict.json fix
    # (secret_redaction.enabled=false — see strict.json in this branch)
    expect: allow

  - label: "Clean Read output (no secret)"
    prompt: "show the readme"
    tools:
      - name: Read
        input: {file_path: "README.md"}
        fake_output: "# My Project\nOpen source project with no credentials.\n"
    expect: allow
