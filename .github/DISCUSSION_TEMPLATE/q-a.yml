title: "[Question]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Ask a question about AI Guardian setup, configuration, or usage. The community and maintainers will help.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you need help with?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What have you tried? Include relevant config, error messages, or screenshots.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: AI Guardian version (if relevant)
      placeholder: "e.g. 1.8.0"
    validations:
      required: false
