name: Tag Creation Monitor

# Monitor all tag creation events for security and audit purposes
# See RELEASING.md for release authorization policy

on:
  push:
    tags:
      - 'v*'      # Production tags (v1.0.0, v1.1.0, etc.)
      - 'v*-test*' # Test tags (v1.0.0-test1, etc.)

jobs:
  monitor-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history to get tag info

      - name: Get tag information
        id: tag-info
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          TAG_CREATOR="${GITHUB_ACTOR}"
          TAG_COMMIT=$(git rev-list -n 1 "${TAG_NAME}")
          COMMIT_MESSAGE=$(git log -1 --pretty=%B "${TAG_COMMIT}")
          COMMIT_AUTHOR=$(git log -1 --pretty=%an "${TAG_COMMIT}")

          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "tag_creator=${TAG_CREATOR}" >> $GITHUB_OUTPUT
          echo "tag_commit=${TAG_COMMIT}" >> $GITHUB_OUTPUT
          echo "commit_author=${COMMIT_AUTHOR}" >> $GITHUB_OUTPUT

          # Save commit message to file (multi-line safe)
          echo "${COMMIT_MESSAGE}" > /tmp/commit_message.txt

      - name: Check authorization
        id: auth-check
        run: |
          TAG_NAME="${{ steps.tag-info.outputs.tag_name }}"
          TAG_CREATOR="${{ steps.tag-info.outputs.tag_creator }}"

          # List of authorized release managers
          AUTHORIZED_USERS=("itdove")

          # Check if tag is production release (not test)
          if [[ "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_PRODUCTION="true"
            TAG_TYPE="Production Release"
          elif [[ "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-test ]]; then
            IS_PRODUCTION="false"
            TAG_TYPE="Test Release (TestPyPI)"
          else
            IS_PRODUCTION="false"
            TAG_TYPE="Unknown"
          fi

          # Check authorization for production releases
          IS_AUTHORIZED="false"
          if [ "${IS_PRODUCTION}" = "true" ]; then
            for user in "${AUTHORIZED_USERS[@]}"; do
              if [ "${TAG_CREATOR}" = "${user}" ]; then
                IS_AUTHORIZED="true"
                break
              fi
            done
          else
            # Test releases are less restricted
            IS_AUTHORIZED="true"
          fi

          echo "is_production=${IS_PRODUCTION}" >> $GITHUB_OUTPUT
          echo "tag_type=${TAG_TYPE}" >> $GITHUB_OUTPUT
          echo "is_authorized=${IS_AUTHORIZED}" >> $GITHUB_OUTPUT

          # Log results
          echo "Tag Type: ${TAG_TYPE}"
          echo "Created by: ${TAG_CREATOR}"
          echo "Authorized: ${IS_AUTHORIZED}"

      - name: Log tag creation (authorized)
        if: steps.auth-check.outputs.is_authorized == 'true'
        run: |
          echo "::notice title=Authorized Tag Created::Tag '${{ steps.tag-info.outputs.tag_name }}' created by authorized user @${{ steps.tag-info.outputs.tag_creator }}"
          echo ""
          echo "========================================================================"
          echo "✓ AUTHORIZED TAG CREATION"
          echo "========================================================================"
          echo "Tag:              ${{ steps.tag-info.outputs.tag_name }}"
          echo "Type:             ${{ steps.auth-check.outputs.tag_type }}"
          echo "Created by:       @${{ steps.tag-info.outputs.tag_creator }}"
          echo "Commit:           ${{ steps.tag-info.outputs.tag_commit }}"
          echo "Commit author:    ${{ steps.tag-info.outputs.commit_author }}"
          echo "Authorization:    ✓ Authorized"
          echo "========================================================================"

      - name: Log tag creation (unauthorized)
        if: steps.auth-check.outputs.is_authorized == 'false'
        run: |
          echo "::error title=Unauthorized Tag Created::Production tag '${{ steps.tag-info.outputs.tag_name }}' created by unauthorized user @${{ steps.tag-info.outputs.tag_creator }}. This tag should be deleted."
          echo ""
          echo "========================================================================"
          echo "✗ UNAUTHORIZED TAG CREATION"
          echo "========================================================================"
          echo "Tag:              ${{ steps.tag-info.outputs.tag_name }}"
          echo "Type:             ${{ steps.auth-check.outputs.tag_type }}"
          echo "Created by:       @${{ steps.tag-info.outputs.tag_creator }}"
          echo "Commit:           ${{ steps.tag-info.outputs.tag_commit }}"
          echo "Commit author:    ${{ steps.tag-info.outputs.commit_author }}"
          echo "Authorization:    ✗ NOT AUTHORIZED"
          echo ""
          echo "ACTION REQUIRED:"
          echo "1. Delete this tag immediately: git push origin :refs/tags/${{ steps.tag-info.outputs.tag_name }}"
          echo "2. Report to repository owner (@itdove)"
          echo "3. Review RELEASING.md authorization policy"
          echo "========================================================================"
          exit 1

      - name: Create issue for unauthorized tag (if unauthorized)
        if: steps.auth-check.outputs.is_authorized == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            const tagName = '${{ steps.tag-info.outputs.tag_name }}';
            const tagCreator = '${{ steps.tag-info.outputs.tag_creator }}';
            const commitSha = '${{ steps.tag-info.outputs.tag_commit }}';

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,unauthorized-release'
            });

            const existingIssue = issues.data.find(
              issue => issue.title.includes(tagName)
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Unauthorized Release Tag: ${tagName}`,
                labels: ['security', 'unauthorized-release', 'priority-high'],
                body: `## Unauthorized Release Tag Detected

            An unauthorized production release tag was created:

            - **Tag:** \`${tagName}\`
            - **Created by:** @${tagCreator}
            - **Commit:** ${commitSha}
            - **Time:** ${new Date().toISOString()}

            ## Required Actions

            - [ ] Verify if this release was intentional
            - [ ] Delete the tag if unauthorized: \`git push origin :refs/tags/${tagName}\`
            - [ ] Review RELEASING.md authorization policy with @${tagCreator}
            - [ ] If release was needed, have authorized user recreate tag

            ## Authorization Policy

            See [RELEASING.md - Release Authorization Policy](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/RELEASING.md#release-authorization-policy) for details.

            Only the following users are authorized to create production release tags:
            - @itdove (Repository Owner)

            ---

            *This issue was automatically created by the tag-monitor workflow.*`
              });

              console.log('Created security issue for unauthorized tag');
            } else {
              console.log('Issue already exists for this tag');
            }

      - name: Audit log
        if: always()
        run: |
          echo "Audit Log Entry:"
          echo "  Timestamp:    $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "  Event:        Tag Creation"
          echo "  Tag:          ${{ steps.tag-info.outputs.tag_name }}"
          echo "  Type:         ${{ steps.auth-check.outputs.tag_type }}"
          echo "  Creator:      @${{ steps.tag-info.outputs.tag_creator }}"
          echo "  Authorized:   ${{ steps.auth-check.outputs.is_authorized }}"
          echo "  Workflow:     ${{ github.workflow }}"
          echo "  Run ID:       ${{ github.run_id }}"
