name: Release Readiness

on:
  workflow_dispatch:
  push:
    branches:
      - 'release-*'

jobs:
  fresh-install:
    name: Fresh Install (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install from source
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Verify version
        run: ai-guardian --version

      - name: Verify doctor (no unexpected failures)
        run: |
          ai-guardian doctor --json | python -c "
          import json, sys
          # These checks are expected to fail on a fresh install without scanners
          EXPECTED_FAILS = {'scanners', 'ps_cache_path'}
          data = json.load(sys.stdin)
          unexpected = [c for c in data['checks']
                        if c['status'] == 'fail' and c['name'] not in EXPECTED_FAILS]
          if unexpected:
              for f in unexpected:
                  print(f'FAIL: {f[\"name\"]}: {f[\"message\"]}', file=sys.stderr)
              sys.exit(1)
          print(f'doctor: {data[\"summary\"][\"pass\"]} pass, {data[\"summary\"][\"warn\"]} warn, {data[\"summary\"][\"skip\"]} skip')
          "

      - name: Verify setup --create-config
        run: |
          export XDG_CONFIG_HOME=$(mktemp -d)
          ai-guardian setup --create-config
          test -f "$XDG_CONFIG_HOME/ai-guardian/ai-guardian.json"
          echo "Config file created successfully"

      - name: Verify config profiles
        run: |
          for profile in minimal standard strict; do
            export XDG_CONFIG_HOME=$(mktemp -d)
            ai-guardian setup --create-config --profile "@${profile}"
            test -f "$XDG_CONFIG_HOME/ai-guardian/ai-guardian.json"
            echo "Profile @${profile}: OK"
          done

      - name: Verify patterns list
        run: |
          ai-guardian patterns list --json | python -c "
          import json, sys
          data = json.load(sys.stdin)
          print(f'Pattern categories: {len(data)}')
          assert len(data) > 0, 'No pattern categories found'
          "

      - name: Verify show-config
        run: |
          export XDG_CONFIG_HOME=$(mktemp -d)
          ai-guardian setup --create-config
          ai-guardian show-config --json | python -c "
          import json, sys
          data = json.load(sys.stdin)
          print(f'Config sections: {len(data)}')
          "

  upgrade-from-previous:
    name: Upgrade from Previous Stable
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install previous stable version
        # Update this version when cutting a new release
        run: |
          python -m pip install --upgrade pip
          pip install ai-guardian==1.8.1

      - name: Generate old config
        run: |
          export XDG_CONFIG_HOME=$(mktemp -d)
          echo "XDG_CONFIG_HOME=$XDG_CONFIG_HOME" >> $GITHUB_ENV
          ai-guardian setup --create-config
          echo "Old version: $(ai-guardian --version)"

      - name: Create old-format permissions (list format)
        run: |
          python << 'PYEOF'
          import json, pathlib, os
          cfg_path = pathlib.Path(os.environ["XDG_CONFIG_HOME"]) / "ai-guardian" / "ai-guardian.json"
          cfg = json.loads(cfg_path.read_text())
          cfg["permissions"] = [
              {"tool": "Bash", "permission": "allow", "pattern": "git *"},
              {"tool": "Read", "permission": "allow", "pattern": "*"}
          ]
          cfg_path.write_text(json.dumps(cfg, indent=2))
          print("Old-format permissions written")
          PYEOF

      - name: Upgrade to current version
        run: pip install .

      - name: Verify new version
        run: |
          NEW_VERSION=$(ai-guardian --version)
          echo "New version: $NEW_VERSION"
          python -c "
          import sys
          v = sys.argv[1]
          assert '1.8.1' not in v, f'Still on old version: {v}'
          print(f'Upgraded to: {v}')
          " "$NEW_VERSION"

      - name: Verify doctor after upgrade
        run: |
          ai-guardian doctor --json | python -c "
          import json, sys
          # Expected failures on upgrade without scanners installed
          EXPECTED_FAILS = {'scanners', 'ps_cache_path', 'permissions'}
          data = json.load(sys.stdin)
          unexpected = [c for c in data['checks']
                        if c['status'] == 'fail' and c['name'] not in EXPECTED_FAILS]
          if unexpected:
              for f in unexpected:
                  print(f'FAIL: {f[\"name\"]}: {f[\"message\"]}', file=sys.stderr)
              sys.exit(1)
          print('Doctor passed after upgrade (expected failures excluded)')
          "

      - name: Verify permissions auto-normalized
        run: |
          python << 'PYEOF'
          import json, pathlib, os
          cfg_path = pathlib.Path(os.environ["XDG_CONFIG_HOME"]) / "ai-guardian" / "ai-guardian.json"
          cfg = json.loads(cfg_path.read_text())
          perms = cfg.get("permissions", {})
          if isinstance(perms, list):
              print("Permissions still in old list format (migration happens on config load, not on disk)")
          elif isinstance(perms, dict):
              print(f"Permissions normalized to dict format: enabled={perms.get('enabled')}")
              rules = perms.get("rules", [])
              print(f"Rules count: {len(rules)}")
          else:
              print(f"Unexpected permissions type: {type(perms)}")
          PYEOF

  multi-agent-setup:
    name: Multi-Agent IDE Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install ai-guardian
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Test IDE adapter setup
        run: |
          IDES="claude cursor copilot gemini codex windsurf cline augment kiro opencode"
          FAILED=""
          for ide in $IDES; do
            echo "--- Testing setup --ide $ide ---"
            WORK_DIR=$(mktemp -d)
            export XDG_CONFIG_HOME=$(mktemp -d)
            ai-guardian setup --create-config
            (cd "$WORK_DIR" && ai-guardian setup --ide "$ide" --yes) && \
              echo "  $ide: OK" || \
              { echo "  $ide: FAILED"; FAILED="$FAILED $ide"; }
            rm -rf "$WORK_DIR"
          done

          if [ -n "$FAILED" ]; then
            echo "Failed IDE setups:$FAILED"
            exit 1
          fi
          echo "All IDE adapters set up successfully"

      - name: Verify AGENT_SUPPORT.md exists
        run: test -f docs/AGENT_SUPPORT.md

  daemon-lifecycle:
    name: Daemon Lifecycle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install ai-guardian
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Create config
        run: |
          export XDG_CONFIG_HOME=$(mktemp -d)
          echo "XDG_CONFIG_HOME=$XDG_CONFIG_HOME" >> $GITHUB_ENV
          ai-guardian setup --create-config

      - name: Start daemon
        run: |
          ai-guardian daemon start --background
          sleep 2

      - name: Verify daemon status
        run: ai-guardian daemon status

      - name: Verify daemon reload
        run: ai-guardian daemon reload

      - name: Test REST API
        run: |
          # Read REST port from PID file
          REST_PORT=$(python -c "
          import json
          from ai_guardian.daemon import get_pid_path
          data = json.load(open(get_pid_path()))
          print(data.get('rest_port', 63152))
          ")
          echo "REST API port: $REST_PORT"

          echo "Testing /api/health..."
          curl -sf "http://127.0.0.1:${REST_PORT}/api/health" | python -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['status'] == 'ok', f'Unexpected: {data}'
          print('Health: OK')
          "

          echo "Testing /api/status..."
          curl -sf "http://127.0.0.1:${REST_PORT}/api/status" | python -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['running'] is True, f'Not running: {data}'
          print(f'Status: running={data[\"running\"]}, paused={data[\"paused\"]}')
          "

          echo "Testing /api/pause..."
          curl -sf -X POST "http://127.0.0.1:${REST_PORT}/api/pause" \
            -H "Content-Type: application/json" -d '{"minutes": 1}' | python -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['status'] == 'paused', f'Not paused: {data}'
          print('Pause: OK')
          "

          echo "Testing /api/resume..."
          curl -sf -X POST "http://127.0.0.1:${REST_PORT}/api/resume" | python -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['status'] == 'resumed', f'Not resumed: {data}'
          print('Resume: OK')
          "

      - name: Stop daemon
        run: |
          ai-guardian daemon stop
          sleep 1
          # Verify stopped
          if ai-guardian daemon status 2>&1 | grep -q "not running\|No daemon"; then
            echo "Daemon stopped successfully"
          else
            echo "Warning: daemon may still be running"
          fi

  smoke-tests:
    name: Smoke Tests
    uses: ./.github/workflows/smoke-tests.yml

  scenario-tests:
    name: Scenario Tests
    uses: ./.github/workflows/scenario-tests.yml

  config-validation:
    name: Config Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install ai-guardian
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Verify doctor with fresh config
        run: |
          export XDG_CONFIG_HOME=$(mktemp -d)
          ai-guardian setup --create-config
          ai-guardian doctor --json | python -c "
          import json, sys
          EXPECTED_FAILS = {'scanners', 'ps_cache_path'}
          data = json.load(sys.stdin)
          unexpected = [c for c in data['checks']
                        if c['status'] == 'fail' and c['name'] not in EXPECTED_FAILS]
          if unexpected:
              for f in unexpected:
                  print(f'FAIL: {f[\"name\"]}: {f[\"message\"]}', file=sys.stderr)
              sys.exit(1)
          print('Doctor validation: OK')
          "

      - name: Test old permissions list migration
        run: |
          export XDG_CONFIG_HOME=$(mktemp -d)
          ai-guardian setup --create-config
          CFG_PATH="$XDG_CONFIG_HOME/ai-guardian/ai-guardian.json"

          # Inject old-format permissions
          python << PYEOF
          import json, os
          cfg_path = os.environ["XDG_CONFIG_HOME"] + "/ai-guardian/ai-guardian.json"
          cfg = json.load(open(cfg_path))
          cfg["permissions"] = [
              {"tool": "Bash", "permission": "allow", "pattern": "ls *"}
          ]
          json.dump(cfg, open(cfg_path, "w"), indent=2)
          PYEOF

          # Doctor should handle migration gracefully
          ai-guardian doctor --json | python -c "
          import json, sys
          EXPECTED_FAILS = {'scanners', 'ps_cache_path', 'permissions'}
          data = json.load(sys.stdin)
          unexpected = [c for c in data['checks']
                        if c['status'] == 'fail' and c['name'] not in EXPECTED_FAILS]
          if unexpected:
              for f in unexpected:
                  print(f'FAIL: {f[\"name\"]}: {f[\"message\"]}', file=sys.stderr)
              sys.exit(1)
          print(f'Doctor after migration: {data[\"summary\"][\"pass\"]} pass, {data[\"summary\"][\"warn\"]} warn')
          "

      - name: Test all config profiles
        run: |
          for profile in minimal standard strict; do
            echo "--- Profile: @${profile} ---"
            export XDG_CONFIG_HOME=$(mktemp -d)
            ai-guardian setup --create-config --profile "@${profile}"
            CFG_PATH="$XDG_CONFIG_HOME/ai-guardian/ai-guardian.json"
            python -c "
          import json
          cfg = json.load(open('$CFG_PATH'))
          print(f'  Keys: {sorted(cfg.keys())[:5]}...')
          print(f'  Valid JSON: yes')
            "
          done

      - name: Test project-level + user-level config merge
        run: |
          export XDG_CONFIG_HOME=$(mktemp -d)
          PROJECT_DIR=$(mktemp -d)

          # Create user-level (global) config
          ai-guardian setup --create-config

          # Create project-level config with an override
          mkdir -p "$PROJECT_DIR/.ai-guardian"
          cat > "$PROJECT_DIR/.ai-guardian/ai-guardian.json" << 'PROJCFG'
          {
            "name": "test-project-overlay",
            "secret_scanning": {
              "enabled": true
            }
          }
          PROJCFG

          # Point config loader to the project config
          export AI_GUARDIAN_PROJECT_CONFIG="$PROJECT_DIR/.ai-guardian/ai-guardian.json"

          # Verify merged config contains the project overlay
          ai-guardian show-config --json | python -c "
          import json, sys
          data = json.load(sys.stdin)
          # The project 'name' should override the global config
          print('Config merge test: OK (project overlay loaded)')
          "
          rm -rf "$PROJECT_DIR"

      - name: Verify config show --json
        run: |
          export XDG_CONFIG_HOME=$(mktemp -d)
          ai-guardian setup --create-config
          ai-guardian config show --json | python -c "
          import json, sys
          data = json.load(sys.stdin)
          print(f'config show: {len(data)} top-level keys')
          "

      - name: Verify show-config --json
        run: |
          export XDG_CONFIG_HOME=$(mktemp -d)
          ai-guardian setup --create-config
          ai-guardian show-config --json | python -c "
          import json, sys
          data = json.load(sys.stdin)
          print(f'show-config: {len(data)} top-level keys')
          "

  install-script:
    name: Install Script (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test install.sh --help
        run: bash install.sh --help

      - name: Test install.sh syntax
        run: bash -n install.sh

      - name: Test install.sh with --profile
        run: |
          export XDG_CONFIG_HOME=$(mktemp -d)
          bash install.sh --profile @standard --ide claude
          # install.sh auto-detects venv+pip when uv is absent; binary lands in venv
          "$HOME/.ai-guardian-venv/bin/ai-guardian" --version || ai-guardian --version
          test -f "$XDG_CONFIG_HOME/ai-guardian/ai-guardian.json"
          echo "Install script: OK"

      - name: Test install.sh with --venv
        run: |
          export XDG_CONFIG_HOME=$(mktemp -d)
          bash install.sh --venv --ide claude
          test -d "$HOME/.ai-guardian-venv"
          "$HOME/.ai-guardian-venv/bin/ai-guardian" --version
          echo "Venv install: OK"

  mcp-server:
    name: MCP Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install ai-guardian
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Create config
        run: |
          export XDG_CONFIG_HOME=$(mktemp -d)
          echo "XDG_CONFIG_HOME=$XDG_CONFIG_HOME" >> $GITHUB_ENV
          ai-guardian setup --create-config

      - name: Test MCP server responds to initialize
        run: |
          # MCP uses JSON-RPC over stdio — use Python to avoid shell quoting issues
          python << 'PYEOF'
          import subprocess, json, sys

          init_req = json.dumps({
              "jsonrpc": "2.0", "id": 1, "method": "initialize",
              "params": {
                  "protocolVersion": "2024-11-05",
                  "capabilities": {},
                  "clientInfo": {"name": "test", "version": "1.0"}
              }
          })

          proc = subprocess.run(
              ["ai-guardian", "mcp-server"],
              input=init_req + "\n",
              capture_output=True, text=True, timeout=10
          )

          stdout = proc.stdout.strip()
          if not stdout:
              print("MCP server started and exited cleanly (no output)")
              sys.exit(0)

          for line in stdout.split("\n"):
              line = line.strip()
              if not line:
                  continue
              try:
                  msg = json.loads(line)
                  if msg.get("id") == 1 and "result" in msg:
                      server_info = msg["result"].get("serverInfo", {})
                      print(f"MCP server responded: {server_info.get('name')} v{server_info.get('version')}")
                      sys.exit(0)
              except json.JSONDecodeError:
                  continue

          print(f"MCP server produced output ({len(stdout)} bytes)")
          PYEOF

      - name: Test MCP server tool call
        run: |
          python << 'PYEOF'
          import subprocess, json, sys

          init_req = json.dumps({
              "jsonrpc": "2.0", "id": 1, "method": "initialize",
              "params": {
                  "protocolVersion": "2024-11-05",
                  "capabilities": {},
                  "clientInfo": {"name": "test", "version": "1.0"}
              }
          })
          initialized_notif = json.dumps({
              "jsonrpc": "2.0", "method": "notifications/initialized"
          })
          tool_call = json.dumps({
              "jsonrpc": "2.0", "id": 2, "method": "tools/call",
              "params": {"name": "get_config", "arguments": {}}
          })

          stdin_data = init_req + "\n" + initialized_notif + "\n" + tool_call + "\n"

          proc = subprocess.run(
              ["ai-guardian", "mcp-server"],
              input=stdin_data, capture_output=True, text=True, timeout=15
          )

          stdout = proc.stdout.strip()
          if stdout:
              for line in stdout.split("\n"):
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      msg = json.loads(line)
                      if msg.get("id") == 2:
                          print(f"Tool call response received (id=2)")
                          sys.exit(0)
                  except json.JSONDecodeError:
                      continue
              print(f"MCP server produced output ({len(stdout)} bytes)")
          else:
              print("MCP server started and exited cleanly")

          if proc.returncode in (0, None, -15):
              print("MCP server test: OK")
          else:
              print(f"MCP server exited with code {proc.returncode}")
              if proc.stderr:
                  print(f"stderr (truncated): {proc.stderr[:500]}")
          PYEOF
