# GitHub Actions CI/CD - Test Workflow
# Runs unit tests with coverage on multiple Python versions

name: Tests

on:
  push:
    branches:
      - main
      - 'release-*'
  pull_request:
    branches:
      - main
      - 'release-*'

jobs:
  version-check:
    name: Verify Scanner Versions Exist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Check scanner versions exist
        run: |
          python scripts/check_scanner_versions.py

  test:
    name: Test Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: version-check

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.14"

    env:
      PYTHONUTF8: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Display Python version
        run: python --version

      - name: Install dependencies and scanners
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-mock pytest-timeout

      - name: Install scanners from pyproject.toml
        run: |
          # Use scanner installer with --use-pinned to install exact versions from pyproject.toml
          # This ensures CI uses the same versions as users and maintains single source of truth
          ai-guardian scanner install gitleaks --use-pinned
          ai-guardian scanner install betterleaks --use-pinned
          ai-guardian scanner install leaktk --use-pinned
        # Windows: scanners install to /usr/local/bin which may not be in PATH;
        # verification step fails even though binaries are present. Tests use mocks.
        continue-on-error: ${{ matrix.os == 'windows-latest' }}

      - name: Run tests with coverage
        env:
          NO_COLOR: "1"
          FORCE_COLOR: "0"
          TERM: "dumb"
        run: |
          pytest tests/ -v --tb=short --timeout=30 --cov=ai_guardian --cov-report=term-missing --cov-report=xml --cov-report=html

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage HTML report
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 7
