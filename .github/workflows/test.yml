# GitHub Actions CI/CD - Test Workflow
# Runs unit tests with coverage on multiple Python versions

name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  version-check:
    name: Verify Scanner Versions Exist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Check scanner versions exist
        run: |
          python scripts/check_scanner_versions.py

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: version-check

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Display Python version
        run: python --version

      - name: Install dependencies and scanners
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-mock

      - name: Install scanners from pyproject.toml
        run: |
          # Use scanner installer with --use-pinned to install exact versions from pyproject.toml
          # This ensures CI uses the same versions as users and maintains single source of truth
          ai-guardian scanner install gitleaks --use-pinned
          ai-guardian scanner install betterleaks --use-pinned
          ai-guardian scanner install leaktk --use-pinned

      - name: Run tests with coverage
        env:
          NO_COLOR: "1"
          FORCE_COLOR: "0"
          TERM: "dumb"
        run: |
          pytest tests/ -v --tb=short --cov=ai_guardian --cov-report=term-missing --cov-report=xml --cov-report=html

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage HTML report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 7
