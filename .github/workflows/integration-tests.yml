name: Integration Tests

on:
  workflow_dispatch:
  schedule:
    # Run integration tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  pull_request:
    paths:
      - 'src/ai_guardian/**'
      - 'tests/**'
      - '.github/workflows/integration-tests.yml'

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Install scanners via ai-guardian (tests scanner install feature)
        run: |
          # Use ai-guardian scanner install with --use-pinned to install from pyproject.toml
          # This tests the actual code path users will use and validates the installer
          echo "Installing scanners using ai-guardian scanner install --use-pinned"
          ai-guardian scanner install gitleaks --use-pinned
          ai-guardian scanner install betterleaks --use-pinned
          ai-guardian scanner install leaktk --use-pinned

          # Verify installations
          echo "Verifying scanner installations:"
          gitleaks version
          betterleaks --version
          leaktk --version

      - name: Run MCP Integration Tests
        run: |
          echo "Running MCP tool integration tests..."
          pytest tests/integration/test_integration_mcp.py -v --tb=short --durations=10

      - name: Run PostToolUse Tests
        run: |
          echo "Running PostToolUse hook tests..."
          pytest tests/unit/test_posttooluse_mcp.py -v --tb=short

      - name: Run Use-Case Scenario Tests
        run: |
          echo "Running realistic attack/defense scenario tests..."
          pytest tests/unit/test_use_cases.py -v --tb=short

      - name: Run Hook Processing Tests
        run: |
          echo "Running hook processing logic tests..."
          pytest tests/unit/test_hook_processing.py -v --tb=short

      - name: Run Advanced Policy Tests
        run: |
          echo "Running advanced tool policy tests..."
          pytest tests/unit/test_tool_policy_advanced.py -v --tb=short

      - name: Generate Coverage Report
        run: |
          pytest tests/integration/test_integration_mcp.py \
                 tests/unit/test_posttooluse_mcp.py \
                 tests/unit/test_use_cases.py \
                 tests/unit/test_hook_processing.py \
                 tests/unit/test_tool_policy_advanced.py \
                 --cov=ai_guardian \
                 --cov-report=html \
                 --cov-report=term-missing

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: Create test summary badge
        run: |
          # Extract test count
          TOTAL_TESTS=$(pytest tests/integration/test_integration_mcp.py tests/unit/test_posttooluse_mcp.py tests/unit/test_use_cases.py tests/unit/test_hook_processing.py tests/unit/test_tool_policy_advanced.py --collect-only -q | tail -1 | awk '{print $1}')
          echo "Total integration tests: $TOTAL_TESTS"
          echo "TOTAL_TESTS=$TOTAL_TESTS" >> $GITHUB_ENV

      - name: Check for failures
        id: test-result
        run: |
          if pytest tests/integration/test_integration_mcp.py tests/unit/test_posttooluse_mcp.py tests/unit/test_use_cases.py tests/unit/test_hook_processing.py tests/unit/test_tool_policy_advanced.py -q; then
            echo "status=passing" >> $GITHUB_OUTPUT
          else
            echo "status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi

  test-isolation:
    name: Test Isolation Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install scanners (gitleaks, betterleaks, leaktk)
        run: |
          # Extract pinned versions from pyproject.toml (single source of truth)
          GITLEAKS_VERSION=$(grep 'gitleaks = ' pyproject.toml | head -1 | cut -d'"' -f2)
          BETTERLEAKS_VERSION=$(grep 'betterleaks = ' pyproject.toml | head -1 | cut -d'"' -f2)
          LEAKTK_VERSION=$(grep 'leaktk = ' pyproject.toml | head -1 | cut -d'"' -f2)

          echo "Installing scanners from pyproject.toml pinned versions:"
          echo "  - gitleaks v${GITLEAKS_VERSION}"
          echo "  - betterleaks v${BETTERLEAKS_VERSION}"
          echo "  - leaktk v${LEAKTK_VERSION}"

          # Install gitleaks
          wget https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz
          tar -xzf gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

          # Install betterleaks
          wget https://github.com/betterleaks/betterleaks/releases/download/v${BETTERLEAKS_VERSION}/betterleaks_${BETTERLEAKS_VERSION}_linux_x64.tar.gz
          tar -xzf betterleaks_${BETTERLEAKS_VERSION}_linux_x64.tar.gz
          sudo mv betterleaks /usr/local/bin/

          # Install leaktk
          wget https://github.com/leaktk/leaktk/releases/download/v${LEAKTK_VERSION}/leaktk_${LEAKTK_VERSION}_linux_x64.tar.gz
          tar -xzf leaktk_${LEAKTK_VERSION}_linux_x64.tar.gz
          sudo mv leaktk /usr/local/bin/

          # Verify installations
          echo "Verifying scanner installations:"
          gitleaks version
          betterleaks --version
          leaktk --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Verify test isolation
        run: |
          # Run tests multiple times to ensure no state leakage
          echo "Run 1..."
          pytest tests/integration/test_integration_mcp.py::MCPToolPermissionTests -v

          echo "Run 2..."
          pytest tests/integration/test_integration_mcp.py::MCPToolPermissionTests -v

          echo "Run 3..."
          pytest tests/integration/test_integration_mcp.py::MCPToolPermissionTests -v

          echo "✅ Test isolation verified - no state leakage between runs"

  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install scanners (gitleaks, betterleaks, leaktk)
        run: |
          # Extract pinned versions from pyproject.toml (single source of truth)
          GITLEAKS_VERSION=$(grep 'gitleaks = ' pyproject.toml | head -1 | cut -d'"' -f2)
          BETTERLEAKS_VERSION=$(grep 'betterleaks = ' pyproject.toml | head -1 | cut -d'"' -f2)
          LEAKTK_VERSION=$(grep 'leaktk = ' pyproject.toml | head -1 | cut -d'"' -f2)

          echo "Installing scanners from pyproject.toml pinned versions:"
          echo "  - gitleaks v${GITLEAKS_VERSION}"
          echo "  - betterleaks v${BETTERLEAKS_VERSION}"
          echo "  - leaktk v${LEAKTK_VERSION}"

          # Install gitleaks
          wget https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz
          tar -xzf gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

          # Install betterleaks
          wget https://github.com/betterleaks/betterleaks/releases/download/v${BETTERLEAKS_VERSION}/betterleaks_${BETTERLEAKS_VERSION}_linux_x64.tar.gz
          tar -xzf betterleaks_${BETTERLEAKS_VERSION}_linux_x64.tar.gz
          sudo mv betterleaks /usr/local/bin/

          # Install leaktk
          wget https://github.com/leaktk/leaktk/releases/download/v${LEAKTK_VERSION}/leaktk_${LEAKTK_VERSION}_linux_x64.tar.gz
          tar -xzf leaktk_${LEAKTK_VERSION}_linux_x64.tar.gz
          sudo mv leaktk /usr/local/bin/

          # Verify installations
          echo "Verifying scanner installations:"
          gitleaks version
          betterleaks --version
          leaktk --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-benchmark

      - name: Check test execution time
        run: |
          # Integration tests should complete in under 10 seconds
          START_TIME=$(date +%s)

          pytest tests/integration/test_integration_mcp.py \
                 tests/unit/test_posttooluse_mcp.py \
                 tests/unit/test_use_cases.py \
                 tests/unit/test_hook_processing.py \
                 tests/unit/test_tool_policy_advanced.py \
                 -v --tb=no

          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          echo "Integration tests completed in ${DURATION} seconds"

          if [ $DURATION -gt 15 ]; then
            echo "⚠️  Warning: Integration tests took longer than expected (${DURATION}s > 15s)"
            exit 1
          else
            echo "✅ Performance OK: ${DURATION}s <= 15s"
          fi
