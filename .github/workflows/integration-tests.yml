name: Integration Tests

on:
  workflow_dispatch:
  schedule:
    # Run integration tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  pull_request:
    paths:
      - 'src/ai_guardian/**'
      - 'tests/**'
      - '.github/workflows/integration-tests.yml'

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Run MCP Integration Tests
        run: |
          echo "Running MCP tool integration tests..."
          pytest tests/test_integration_mcp.py -v --tb=short --durations=10

      - name: Run PostToolUse Tests
        run: |
          echo "Running PostToolUse hook tests..."
          pytest tests/test_posttooluse_mcp.py -v --tb=short

      - name: Run Use-Case Scenario Tests
        run: |
          echo "Running realistic attack/defense scenario tests..."
          pytest tests/test_use_cases.py -v --tb=short

      - name: Run Hook Processing Tests
        run: |
          echo "Running hook processing logic tests..."
          pytest tests/test_hook_processing.py -v --tb=short

      - name: Run Advanced Policy Tests
        run: |
          echo "Running advanced tool policy tests..."
          pytest tests/test_tool_policy_advanced.py -v --tb=short

      - name: Generate Coverage Report
        run: |
          pytest tests/test_integration_mcp.py \
                 tests/test_posttooluse_mcp.py \
                 tests/test_use_cases.py \
                 tests/test_hook_processing.py \
                 tests/test_tool_policy_advanced.py \
                 --cov=ai_guardian \
                 --cov-report=html \
                 --cov-report=term-missing

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: Create test summary badge
        run: |
          # Extract test count
          TOTAL_TESTS=$(pytest tests/test_integration_mcp.py tests/test_posttooluse_mcp.py tests/test_use_cases.py tests/test_hook_processing.py tests/test_tool_policy_advanced.py --collect-only -q | tail -1 | awk '{print $1}')
          echo "Total integration tests: $TOTAL_TESTS"
          echo "TOTAL_TESTS=$TOTAL_TESTS" >> $GITHUB_ENV

      - name: Check for failures
        id: test-result
        run: |
          if pytest tests/test_integration_mcp.py tests/test_posttooluse_mcp.py tests/test_use_cases.py tests/test_hook_processing.py tests/test_tool_policy_advanced.py -q; then
            echo "status=passing" >> $GITHUB_OUTPUT
          else
            echo "status=failing" >> $GITHUB_OUTPUT
            exit 1
          fi

  test-isolation:
    name: Test Isolation Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Verify test isolation
        run: |
          # Run tests multiple times to ensure no state leakage
          echo "Run 1..."
          pytest tests/test_integration_mcp.py::MCPToolPermissionTests -v

          echo "Run 2..."
          pytest tests/test_integration_mcp.py::MCPToolPermissionTests -v

          echo "Run 3..."
          pytest tests/test_integration_mcp.py::MCPToolPermissionTests -v

          echo "✅ Test isolation verified - no state leakage between runs"

  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-benchmark

      - name: Check test execution time
        run: |
          # Integration tests should complete in under 10 seconds
          START_TIME=$(date +%s)

          pytest tests/test_integration_mcp.py \
                 tests/test_posttooluse_mcp.py \
                 tests/test_use_cases.py \
                 tests/test_hook_processing.py \
                 tests/test_tool_policy_advanced.py \
                 -v --tb=no

          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          echo "Integration tests completed in ${DURATION} seconds"

          if [ $DURATION -gt 15 ]; then
            echo "⚠️  Warning: Integration tests took longer than expected (${DURATION}s > 15s)"
            exit 1
          else
            echo "✅ Performance OK: ${DURATION}s <= 15s"
          fi
