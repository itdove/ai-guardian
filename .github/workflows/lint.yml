# GitHub Actions CI/CD - Lint Workflow
# Runs code quality checks on pull requests

name: Lint

on:
  push:
    branches:
      - 'dev/*'
      - 'release-*'
  pull_request:
    branches:
      - main
      - 'dev/*'
      - 'release-*'

jobs:
  pylint:
    name: Pylint Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pylint

      - name: Run pylint
        run: |
          pylint src/ai_guardian/ --disable=all --enable=E \
            --disable=E1101,E0611,E2515,E2502,E0602,E0601,E1123,E1120,E0213,E0102,E0203,E1129,E0401 \
            --output-format=text

  black:
    name: Black Code Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install black
        run: |
          python -m pip install --upgrade pip
          pip install "black>=26,<27"

      - name: Check formatting with black
        run: |
          black --check src/ai_guardian/ tests/

  ruff:
    name: Ruff Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff
        run: |
          ruff check src/ai_guardian/ tests/
