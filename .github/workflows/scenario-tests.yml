# CI: Dummy-Agent Scenario Tests
#
# Builds the hook-testing container image and runs all bundled scenarios
# for each profile to catch regressions in hook processing before merge.
#
# Uses quay.io/itdove/ai-guardian:latest as base to avoid rebuilding the full
# IDE-CLI image on every run. Local source (src/) is installed on top of the
# base image so PRs that touch Python code are always tested at HEAD.
#
# Profiles tested: standard, strict, minimal
# Moderator profile is excluded — action=ask auto-dismisses in headless CI,
# making those scenarios untestable without dialog mocking (see #1501).

name: Scenario Tests

on:
  push:
    branches: [main, 'dev/*']
    paths:
      - 'container/**'
      - 'src/ai_guardian/**'
      - '.github/workflows/scenario-tests.yml'
  pull_request:
    branches:
      - main
      - 'dev/*'
      - 'release-*'
    paths:
      - 'container/**'
      - 'src/ai_guardian/**'
      - '.github/workflows/scenario-tests.yml'
  workflow_call:
  workflow_dispatch:

jobs:
  scenario-tests:
    name: Scenario Tests (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [standard, strict, minimal]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Pull base image
        run: docker pull quay.io/itdove/ai-guardian:latest

      - name: Build test image
        run: |
          docker build \
            -f container/Dockerfile.test \
            --build-arg BASE_IMAGE=quay.io/itdove/ai-guardian:latest \
            -t ai-guardian-test \
            .

      - name: Run ${{ matrix.profile }} scenarios
        run: docker run --rm -e AI_GUARDIAN_PROFILE=${{ matrix.profile }} ai-guardian-test /sandbox/run-scenarios.sh
