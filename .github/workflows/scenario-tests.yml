# CI: Dummy-Agent Scenario Tests
#
# Builds the hook-testing container image and runs all bundled scenarios
# for each profile to catch regressions in hook processing before merge.
#
# Calls build-container.yml to build a commit-SHA-tagged base image, then
# layers local source (src/) on top via Dockerfile.test so PRs always test
# at HEAD with a matching base image (#1554).
#
# Profiles tested: standard, strict, minimal
# Moderator profile is excluded — action=ask auto-dismisses in headless CI,
# making those scenarios untestable without dialog mocking (see #1501).

name: Scenario Tests

on:
  push:
    branches: [main, 'dev/*']
    paths:
      - 'container/**'
      - 'src/ai_guardian/**'
      - '.github/workflows/scenario-tests.yml'
  pull_request:
    branches:
      - main
      - 'dev/*'
      - 'release-*'
    paths:
      - 'container/**'
      - 'src/ai_guardian/**'
      - '.github/workflows/scenario-tests.yml'
  workflow_call:
  workflow_dispatch:

jobs:
  build-image:
    name: Build Container Image
    uses: ./.github/workflows/build-container.yml
    secrets: inherit

  scenario-tests:
    name: Scenario Tests (${{ matrix.profile }})
    needs: build-image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [standard, strict, minimal]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Pull base image
        run: docker pull quay.io/itdove/ai-guardian:${{ github.sha }}

      - name: Build test image
        run: |
          docker build \
            -f container/Dockerfile.test \
            --build-arg BASE_IMAGE=quay.io/itdove/ai-guardian:${{ github.sha }} \
            -t ai-guardian-test \
            .

      - name: Run ${{ matrix.profile }} scenarios
        run: docker run --rm -e AI_GUARDIAN_PROFILE=${{ matrix.profile }} ai-guardian-test /sandbox/run-scenarios.sh

  cleanup-image:
    name: Cleanup SHA Image
    needs: scenario-tests
    if: always() && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main'))
    runs-on: ubuntu-latest
    steps:
      - name: Delete SHA-tagged image
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X DELETE \
            -u "${{ secrets.QUAY_USERNAME }}:${{ secrets.QUAY_PASSWORD }}" \
            "https://quay.io/api/v1/repository/itdove/ai-guardian/tag/${{ github.sha }}")
          echo "Quay API responded: $STATUS"
          [ "$STATUS" = "204" ] || [ "$STATUS" = "404" ]
