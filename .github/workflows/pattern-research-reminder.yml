name: Security Pattern Research Reminder

on:
  schedule:
    # Run twice-monthly on 1st and 15th at 9am UTC
    - cron: '0 9 1,15 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  create-reminder:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v7

      - name: Check for existing reminder issue
        id: check-existing
        uses: actions/github-script@v9
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'pattern-research-reminder',
              state: 'open'
            });

            if (issues.length > 0) {
              console.log(`Found existing reminder issue #${issues[0].number}`);
              core.setOutput('exists', 'true');
              core.setOutput('issue_number', issues[0].number);
            } else {
              console.log('No existing reminder issue found');
              core.setOutput('exists', 'false');
            }

      - name: Comment on existing issue
        if: steps.check-existing.outputs.exists == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.check-existing.outputs.issue_number }},
              body: `⏰ **Twice-monthly Reminder**

              This pattern research review is still open. Please complete the review or close this issue if already done.

              - Auto-reminder triggered: ${new Date().toISOString().split('T')[0]}`
            });

            console.log('Commented on existing issue instead of creating new one');

      - name: Create new reminder issue
        if: steps.check-existing.outputs.exists == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Twice-monthly: Review security pattern sources for updates`,
              labels: ['pattern-research-reminder', 'research', 'security', 'maintenance'],
              body: `## 🔍 Scheduled Security Pattern Research Review

              Time to check security research sources for new patterns across all ai-guardian scanners.

              **Auto-reminder created**: ${new Date().toISOString().split('T')[0]}

              ---

              ## 📋 Research Checklist

              Review the following sources (see [AGENTS.md](AGENTS.md#periodic-pattern-maintenance) for full process and evaluation criteria):

              ### Priority Sources (Check All)

              - [ ] **Hermes Security Patterns** - https://github.com/fullsend-ai/experiments/tree/main/0009-hermes-security-patterns
                - Last reviewed: _[update date after review]_
                - Check: new payloads in \`payloads/\`, new experiments relevant to AI IDE security

              - [ ] **OWASP LLM Top 10** - https://owasp.org/www-project-top-10-for-large-language-model-applications/
                - Last reviewed: _[update date after review]_
                - Check: new categories, updated attack descriptions

              - [ ] **Gitleaks community config** - https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
                - Last reviewed: _[update date after review]_
                - Check: new credential rules not yet in \`src/ai_guardian/patterns/data/secrets.toml\`

              - [ ] **TruffleHog detectors** - https://github.com/trufflesecurity/trufflehog/tree/main/pkg/detectors
                - Last reviewed: _[update date after review]_
                - Check: new cloud provider/service credential formats

              - [ ] **AI Security Research Papers** - Search arXiv, Google Scholar for recent publications
                - Keywords: "prompt injection", "LLM jailbreak", "context poisoning", "AI agent security"
                - Last reviewed: _[update date after review]_
                - Relevant papers: _[list any found]_

              ### Optional Sources (Review if Time Permits)

              - [ ] **CVE Database** - Search for AI/LLM/agent vulnerabilities
              - [ ] **Security Researcher Blogs** - Known AI security experts
              - [ ] **Cloud Provider Announcements** - New API key formats from AWS, GCP, Azure, etc.
              - [ ] **Security Conference Proceedings** - DEF CON AI Village, Black Hat, RSA

              ---

              ## 🔬 Scanner-Specific Review

              Work through each scanner and record findings below:

              ### 🔍 Prompt Injection (\`src/ai_guardian/scanners/prompt_injection.py\`)
              Sources: Hermes payloads, OWASP LLM Top 10, arXiv papers
              - [ ] Reviewed
              - New patterns found: _[yes/no — if yes, create enhancement issue]_

              ### 🧠 Context Poisoning (\`src/ai_guardian/scanners/context_poisoning.py\`)
              Sources: Hermes context-injection payloads, OWASP LLM03, arXiv papers
              - [ ] Reviewed
              - New patterns found: _[yes/no]_

              ### 🔑 Secrets (\`src/ai_guardian/patterns/data/secrets.toml\`)
              Sources: Gitleaks community config, TruffleHog detectors, cloud provider announcements
              - [ ] Reviewed
              - New credential formats found: _[yes/no]_

              ### 🌐 SSRF (\`src/ai_guardian/scanners/ssrf.py\`, \`src/ai_guardian/patterns/data/ssrf.toml\`)
              Sources: CVE database, security blogs — look for new cloud metadata endpoints, redirect bypass techniques, new internal IP ranges
              - [ ] Reviewed
              - New bypass techniques or endpoints found: _[yes/no]_

              ### 📁 Config File Exfil (\`src/ai_guardian/scanners/config_scanner.py\`)
              Sources: Security blogs, cloud provider docs — look for new config file paths/formats that expose credentials
              - [ ] Reviewed
              - New config file patterns found: _[yes/no]_

              ### 📦 Supply Chain (\`src/ai_guardian/scanners/supply_chain.py\`)
              Sources: OWASP Agentic ASI04, security blogs — look for new MCP server poisoning techniques, malicious package patterns, agent config hijacking
              - [ ] Reviewed
              - New patterns found: _[yes/no]_

              ### 🗣️ Offensive Language (\`src/ai_guardian/patterns/data/offensive-*.toml\`)
              Sources: Community reports, inclusive language guides — look for new non-inclusive terminology or slur patterns
              - [ ] Reviewed
              - New patterns found: _[yes/no]_

              ### 🐤 Canary Detection (\`src/ai_guardian/scanners/canary_detection.py\`)
              Sources: Canary token services, security tools — look for new canary token formats or services
              - [ ] Reviewed
              - New token formats found: _[yes/no]_

              ### 📤 Exfil Detection (\`src/ai_guardian/scanners/exfil_detection.py\`)
              Sources: Security research, CVE database — look for new data exfiltration techniques via CLI commands, encoding tricks, or side channels
              - [ ] Reviewed
              - New exfil techniques found: _[yes/no]_

              ---

              ## ✅ Pattern Evaluation Criteria

              For each candidate pattern, evaluate against all 5 criteria from [AGENTS.md](AGENTS.md#periodic-pattern-maintenance):

              1. **Applies to AI IDEs** — affects tools like Claude Code, Cursor, Copilot
              2. **Not Duplicate** — not already covered in the relevant scanner file
              3. **Low False Positives** — detection won't block legitimate code or docs
              4. **Reproducible** — concrete examples exist to demonstrate the attack
              5. **License Compatible** — source uses permissive license (MIT/Apache-2.0/BSD/CC0/Public Domain) or academic fair use
                 - Check GitHub repos: \`curl -s https://api.github.com/repos/OWNER/REPO | jq -r '.license.spdx_id'\`
                 - **Acceptable**: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, CC0-1.0, ISC, Unlicense, Public Domain
                 - **Unacceptable**: GPL*, AGPL*, proprietary, "All Rights Reserved"

              ---

              ## 📝 Next Steps

              ### If New Patterns Found

              1. Create a pattern enhancement issue using the [pattern enhancement template](.github/ISSUE_TEMPLATE/pattern-enhancement.md)
              2. Specify the scanner in the issue title: \`[Pattern][secrets]\` / \`[Pattern][ssrf]\` / etc.
              3. Link the new issue to this reminder
              4. Update last review dates in [AGENTS.md](AGENTS.md#tracking-last-review)
              5. Close this reminder issue

              ### If No New Patterns Found

              1. Update last review dates in [AGENTS.md](AGENTS.md#tracking-last-review)
              2. Add comment summarizing what was reviewed and any noteworthy trends
              3. Close this reminder issue

              ---

              ## 🔗 Related

              - [AGENTS.md - Periodic Pattern Maintenance](AGENTS.md#periodic-pattern-maintenance)
              - [Pattern Enhancement Template](.github/ISSUE_TEMPLATE/pattern-enhancement.md)

              ---

              **⏰ Next Reminder**: Approximately ${(() => { const d = new Date(); const day = d.getDate(); if (day < 15) { d.setDate(15); } else { d.setMonth(d.getMonth() + 1); d.setDate(1); } return d.toISOString().split('T')[0]; })()} (1st or 15th of the month)
              `
            });

            console.log(`Created reminder issue #${issue.data.number}`);
