category_tag = "profanity"
re2_compat = false

[[rules]]
id = "profanity-pword"
match_type = "regex"
regex = '''\bp[i!1]ss(ed|ing|er|off)?\b'''
case_insensitive = true
description = "Profanity: p-word variant"
category_tag = "profanity"
re2_compat = false

