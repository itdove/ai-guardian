[[rules]]
id = "stripe-public-key"
match_type = "regex"
regex = '''(pk_live_[A-Za-z0-9]{24,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "Stripe Public Key"
keywords = ["pk_live_"]

[[rules]]
id = "stripe-test-public-key"
match_type = "regex"
regex = '''(pk_test_[A-Za-z0-9]{24,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "Stripe Test Public Key"
keywords = ["pk_test_"]

[[rules]]
id = "stripe-restricted-key"
