[[rules]]
id = "twilio-api-key"
match_type = "regex"
regex = '''(SK[A-Za-z0-9]{32})'''
redaction_strategy = "preserve_prefix_suffix"
description = "Twilio API Key"
keywords = ["SK"]

[[rules]]
id = "sendgrid-api-key"
match_type = "regex"
regex = '''(SG\.[A-Za-z0-9\-_]{22}\.[A-Za-z0-9\-_]{43})'''
redaction_strategy = "preserve_prefix_suffix"
description = "SendGrid API Key"
keywords = ["SG."]

[[rules]]
id = "mailgun-api-key"
match_type = "regex"
regex = '''(key-[A-Za-z0-9]{32})'''
redaction_strategy = "preserve_prefix_suffix"
description = "Mailgun API Key"
keywords = ["key-"]

# --- Cryptographic Material ---

[[rules]]
id = "private-key"
match_type = "regex"
regex = '''(-----BEGIN [A-Z ]+PRIVATE KEY-----[\s\S]+?-----END [A-Z ]+PRIVATE KEY-----)'''
redaction_strategy = "private_key"
description = "Private Key"
keywords = ["BEGIN", "PRIVATE KEY"]
dotall = true

# --- Environment Variables ---

[[rules]]
id = "env-variable"
match_type = "regex"
regex = '''([A-Z_][A-Z0-9_]*)\s*=\s*(["']?)([A-Za-z0-9\-_+/=]{16,})\2'''
redaction_strategy = "env_assignment"
description = "Environment Variable"

[[rules]]
id = "exported-env-variable"
match_type = "regex"
regex = '''(export\s+[A-Z_][A-Z0-9_]*)\s*=\s*(["']?)([A-Za-z0-9\-_+/=]{16,})\2'''
redaction_strategy = "env_assignment"
description = "Exported Environment Variable"
keywords = ["export"]

# --- Structured Data Fields ---

[[rules]]
id = "json-api-key"
match_type = "regex"
regex = '''"(api[_-]?key)"\s*:\s*"([^"]{16,})"'''
redaction_strategy = "json_field"
description = "JSON API Key"
keywords = ["api_key", "api-key"]

[[rules]]
id = "json-token"
match_type = "regex"
regex = '''"(token)"\s*:\s*"([^"]{16,})"'''
redaction_strategy = "json_field"
description = "JSON Token"
keywords = ["token"]

[[rules]]
id = "json-password"
match_type = "regex"
regex = '''"(password)"\s*:\s*"([^"]{16,})"'''
redaction_strategy = "json_field"
description = "JSON Password"
keywords = ["password"]

[[rules]]
id = "json-secret"
match_type = "regex"
regex = '''"(secret)"\s*:\s*"([^"]{16,})"'''
redaction_strategy = "json_field"
description = "JSON Secret"
keywords = ["secret"]

[[rules]]
id = "yaml-password"
match_type = "regex"
regex = '''(password:\s*)([^\s\n]{8,})'''
redaction_strategy = "yaml_password"
description = "YAML Password"
keywords = ["password:"]

# --- HTTP Headers ---

[[rules]]
id = "bearer-token"
match_type = "regex"
regex = '''(Authorization:\s*Bearer\s+)([A-Za-z0-9\-._~+/]+=*)'''
redaction_strategy = "auth_header"
description = "Bearer Token"
keywords = ["Authorization", "Bearer"]

[[rules]]
id = "api-key-header"
match_type = "regex"
regex = '''(X-API-Key:\s*)([^\s]+)'''
redaction_strategy = "header_value"
description = "API Key Header"
keywords = ["X-API-Key"]

[[rules]]
id = "auth-token-header"
match_type = "regex"
regex = '''(X-Auth-Token:\s*)([^\s]+)'''
redaction_strategy = "header_value"
description = "Auth Token Header"
keywords = ["X-Auth-Token"]

# --- Database Connection Strings ---

[[rules]]
id = "mongodb-connection"
match_type = "regex"
regex = '''(mongodb://[^:]+:)([^@]+)(@[^\s]+)'''
redaction_strategy = "connection_string"
description = "MongoDB Connection"
keywords = ["mongodb://"]

[[rules]]
id = "mysql-connection"
match_type = "regex"
regex = '''(mysql://[^:]+:)([^@]+)(@[^\s]+)'''
redaction_strategy = "connection_string"
description = "MySQL Connection"
keywords = ["mysql://"]

[[rules]]
id = "postgres-connection"
match_type = "regex"
regex = '''(postgres://[^:]+:)([^@]+)(@[^\s]+)'''
redaction_strategy = "connection_string"
description = "PostgreSQL Connection"
keywords = ["postgres://"]

[[rules]]
id = "redis-connection"
match_type = "regex"
regex = '''(redis://[^:]*:)([^@]+)(@[^\s]+)'''
redaction_strategy = "connection_string"
description = "Redis Connection"
keywords = ["redis://"]

# --- Generic Secret Patterns ---

[[rules]]
id = "hex-secret-with-context"
match_type = "regex"
regex = '''((?:secret|key|token|password|credential)[\s"'=:]+)([a-f0-9]{40,})\b'''
redaction_strategy = "context_secret"
description = "Hex Secret"
keywords = ["secret", "key", "token", "password", "credential"]

[[rules]]
id = "very-long-hex-secret"
match_type = "regex"
regex = '''\b([a-f0-9]{100,})\b'''
redaction_strategy = "preserve_prefix_suffix"
description = "Very Long Hex Secret"

[[rules]]
id = "base64-secret-with-context"
match_type = "regex"
regex = '''((?:secret|key|token|password|credential)[\s"'=:]+)([A-Za-z0-9+/]{40,}={0,2})\b'''
redaction_strategy = "context_secret"
description = "Base64 Secret"
keywords = ["secret", "key", "token", "password", "credential"]

[[rules]]
id = "very-long-base64-secret"
match_type = "regex"
regex = '''\b([A-Za-z0-9+/]{100,}={0,2})\b'''
redaction_strategy = "preserve_prefix_suffix"
description = "Very Long Base64 Secret"
