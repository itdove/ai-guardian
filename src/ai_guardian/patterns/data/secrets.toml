redaction_strategy = "context_secret"
description = "PayPal Client Secret"
keywords = ["paypal"]

# --- Cryptographic Material ---

[[rules]]
id = "private-key"
match_type = "regex"
regex = '''(-----BEGIN [A-Z ]+PRIVATE KEY-----[\s\S]+?-----END [A-Z ]+PRIVATE KEY-----)'''
redaction_strategy = "private_key"
description = "Private Key"
keywords = ["BEGIN", "PRIVATE KEY"]
dotall = true

# --- Environment Variables ---

[[rules]]
id = "env-variable"
match_type = "regex"
regex = '''([A-Z][A-Z0-9_]+)\s*=\s*(["']?)([A-Za-z0-9\-_+/=]{16,})\2'''
redaction_strategy = "env_assignment"
description = "Environment Variable"
validation = "env_not_false_positive"

[[rules]]
id = "exported-env-variable"
match_type = "regex"
regex = '''(export\s+[A-Z][A-Z0-9_]+)\s*=\s*(["']?)([A-Za-z0-9\-_+/=]{16,})\2'''
redaction_strategy = "env_assignment"
description = "Exported Environment Variable"
keywords = ["export"]
validation = "env_not_false_positive"

# --- Structured Data Fields ---

[[rules]]
id = "json-api-key"
match_type = "regex"
regex = '''"(api[_-]?key)"\s*:\s*"([^"]{16,})"'''
redaction_strategy = "json_field"
description = "JSON API Key"
keywords = ["api_key", "api-key"]

[[rules]]
id = "json-token"
match_type = "regex"
regex = '''"(token)"\s*:\s*"([^"]{16,})"'''
redaction_strategy = "json_field"
description = "JSON Token"
keywords = ["token"]

[[rules]]
id = "json-password"
match_type = "regex"
regex = '''"(password)"\s*:\s*"([^"]{16,})"'''
redaction_strategy = "json_field"
description = "JSON Password"
keywords = ["password"]

[[rules]]
id = "json-secret"
match_type = "regex"
regex = '''"(secret)"\s*:\s*"([^"]{16,})"'''
redaction_strategy = "json_field"
description = "JSON Secret"
keywords = ["secret"]

[[rules]]
id = "yaml-password"
match_type = "regex"
regex = '''(password:\s*)([^\s\n]{8,})'''
redaction_strategy = "yaml_password"
description = "YAML Password"
keywords = ["password:"]

[[rules]]
id = "generic-password-assignment"
match_type = "regex"
regex = '''(?i)((?:password|passwd|secret|secret_key|api_secret|db_password|db_passwd)\s*=\s*["'])([^"']{8,})'''
redaction_strategy = "context_secret"
description = "Password/Secret Assignment"
keywords = ["password", "passwd", "secret", "secret_key", "api_secret"]
validation = "password_not_false_positive"

# --- HTTP Headers ---

[[rules]]
id = "bearer-token"
match_type = "regex"
regex = '''(Authorization:\s*Bearer\s+)([A-Za-z0-9\-._~+/]+=*)'''
redaction_strategy = "auth_header"
description = "Bearer Token"
keywords = ["Authorization", "Bearer"]

[[rules]]
id = "api-key-header"
match_type = "regex"
regex = '''(X-API-Key:\s*)([^\s]+)'''
redaction_strategy = "header_value"
description = "API Key Header"
keywords = ["X-API-Key"]

[[rules]]
id = "auth-token-header"
match_type = "regex"
regex = '''(X-Auth-Token:\s*)([^\s]+)'''
redaction_strategy = "header_value"
description = "Auth Token Header"
keywords = ["X-Auth-Token"]

# --- Database Connection Strings ---

[[rules]]
id = "mongodb-connection"
match_type = "regex"
regex = '''(mongodb://[^:]+:)([^@]+)(@[^\s]+)'''
redaction_strategy = "connection_string"
validation = "connection_not_placeholder"
description = "MongoDB Connection"
keywords = ["mongodb://"]

[[rules]]
id = "mysql-connection"
match_type = "regex"
regex = '''(mysql://[^:]+:)([^@]+)(@[^\s]+)'''
