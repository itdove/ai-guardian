# Secret detection patterns for ai-guardian
# Source: Extracted from SecretRedactor.PATTERNS
# Match type: regex (all rules)
# Action is configured in ai-guardian.json secret_scanning.action, NOT here
#
# Custom liveness validation (v1.11.0+, Issue #971):
#   For custom/internal rules, add a 'live_validation' table to check if
#   detected secrets are still active via API call:
#
#   [[rules]]
#   id = "internal-api-key"
#   regex = '''INTERNAL_KEY=([a-zA-Z0-9]{32})'''
#   live_validation = { url = "https://internal.corp.com/verify", auth = "bearer", expect = 200 }
#
#   Built-in rule IDs (openai-api-key, github-personal-token, etc.) use
#   hardcoded validators — no live_validation config needed.

# --- API Keys and Tokens ---

[[rules]]
id = "openai-api-key"
match_type = "regex"
regex = '''(sk-[A-Za-z0-9]{20,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "OpenAI API Key"
keywords = ["sk-"]
validation = "token_not_placeholder"

[[rules]]
id = "openai-project-key"
match_type = "regex"
regex = '''(sk-proj-[A-Za-z0-9]{20,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "OpenAI Project Key"
keywords = ["sk-proj-"]
validation = "token_not_placeholder"

[[rules]]
id = "github-personal-token"
match_type = "regex"
regex = '''(ghp_[A-Za-z0-9._-]{36,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "GitHub Personal Token"
keywords = ["ghp_"]
validation = "token_not_placeholder"

[[rules]]
id = "github-oauth-token"
