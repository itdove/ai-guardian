regex = '''(rk_live_[A-Za-z0-9]{24,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "Stripe Restricted Key"
keywords = ["rk_live_"]

[[rules]]
id = "stripe-test-restricted-key"
match_type = "regex"
regex = '''(rk_test_[A-Za-z0-9]{24,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "Stripe Test Restricted Key"
