# --- Generic Secret Patterns ---

[[rules]]
id = "hex-secret-with-context"
match_type = "regex"
regex = '''((?:secret|key|token|password|credential)[\s"'=:]+)([a-f0-9]{40,})\b'''
redaction_strategy = "context_secret"
description = "Hex Secret"
keywords = ["secret", "key", "token", "password", "credential"]

[[rules]]
id = "very-long-hex-secret"
match_type = "regex"
regex = '''\b([a-f0-9]{100,})\b'''
redaction_strategy = "preserve_prefix_suffix"
description = "Very Long Hex Secret"

[[rules]]
id = "base64-secret-with-context"
match_type = "regex"
regex = '''((?:secret|key|token|password|credential)[\s"'=:]+)([A-Za-z0-9+/]{40,}={0,2})\b'''
redaction_strategy = "context_secret"
description = "Base64 Secret"
keywords = ["secret", "key", "token", "password", "credential"]
validation = "base64_not_file_path"

[[rules]]
id = "very-long-base64-secret"
match_type = "regex"
regex = '''\b([A-Za-z0-9+/]{100,}={0,2})\b'''
redaction_strategy = "preserve_prefix_suffix"
description = "Very Long Base64 Secret"
