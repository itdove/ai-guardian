# Secret detection patterns for ai-guardian
# Source: Extracted from SecretRedactor.PATTERNS
# Match type: regex (all rules)
# Action is configured in ai-guardian.json secret_scanning.action, NOT here

# --- API Keys and Tokens ---

[[rules]]
id = "openai-api-key"
match_type = "regex"
regex = '''(sk-[A-Za-z0-9]{20,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "OpenAI API Key"
keywords = ["sk-"]

[[rules]]
id = "openai-project-key"
match_type = "regex"
regex = '''(sk-proj-[A-Za-z0-9]{20,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "OpenAI Project Key"
keywords = ["sk-proj-"]

[[rules]]
id = "github-personal-token"
match_type = "regex"
regex = '''(ghp_[A-Za-z0-9]{36,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "GitHub Personal Token"
keywords = ["ghp_"]

[[rules]]
id = "github-oauth-token"
match_type = "regex"
regex = '''(gho_[A-Za-z0-9]{36,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "GitHub OAuth Token"
keywords = ["gho_"]

[[rules]]
id = "github-refresh-token"
match_type = "regex"
regex = '''(ghr_[A-Za-z0-9]{36,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "GitHub Refresh Token"
keywords = ["ghr_"]

[[rules]]
id = "github-secret-token"
match_type = "regex"
regex = '''(ghs_[A-Za-z0-9]{36,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "GitHub Secret Token"
keywords = ["ghs_"]

[[rules]]
id = "anthropic-api-key"
match_type = "regex"
regex = '''(sk-ant-[A-Za-z0-9\-_]{32,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "Anthropic API Key"
keywords = ["sk-ant-"]

[[rules]]
id = "gitlab-personal-token"
match_type = "regex"
regex = '''(glpat-[A-Za-z0-9\-_]{20,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "GitLab Personal Token"
keywords = ["glpat-"]

[[rules]]
id = "slack-token"
match_type = "regex"
regex = '''(xox[baprs]-[A-Za-z0-9\-]+)'''
redaction_strategy = "preserve_prefix_suffix"
description = "Slack Token"
keywords = ["xox"]

# --- Cloud Provider Keys ---

[[rules]]
id = "aws-access-key"
match_type = "regex"
regex = '''\b(AKIA[A-Z0-9]{16})\b'''
redaction_strategy = "full_redact"
description = "AWS Access Key"
keywords = ["AKIA"]

[[rules]]
id = "aws-secret-key"
match_type = "regex"
regex = '''(aws_secret_access_key\s*=\s*)([^\s]+)'''
redaction_strategy = "aws_secret"
description = "AWS Secret Key"
keywords = ["aws_secret"]

[[rules]]
id = "google-oauth-token"
match_type = "regex"
regex = '''(ya29\.[A-Za-z0-9\-_]+)'''
redaction_strategy = "preserve_prefix_suffix"
description = "Google OAuth Token"
keywords = ["ya29."]

[[rules]]
id = "google-api-key"
match_type = "regex"
regex = '''(AIza[A-Za-z0-9\-_]{35})'''
redaction_strategy = "preserve_prefix_suffix"
description = "Google API Key"
keywords = ["AIza"]

[[rules]]
id = "azure-client-secret"
match_type = "regex"
regex = '''(?:client.?secret|AZURE_CLIENT_SECRET)\s*[=:]\s*([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})'''
redaction_strategy = "preserve_prefix_suffix"
description = "Azure Client Secret"
keywords = ["client_secret", "AZURE_CLIENT_SECRET"]

# --- Package Registry Tokens ---

[[rules]]
id = "npm-token"
match_type = "regex"
regex = '''(npm_[A-Za-z0-9]{36})'''
redaction_strategy = "preserve_prefix_suffix"
description = "npm Token"
keywords = ["npm_"]

[[rules]]
id = "pypi-token"
match_type = "regex"
regex = '''(pypi-[A-Za-z0-9\-_]{43,})'''
redaction_strategy = "preserve_prefix_suffix"
description = "PyPI Token"
keywords = ["pypi-"]

