# Unicode attack detection patterns for ai-guardian
# Source: Extracted from UnicodeAttackDetector class
# Categories: zero-width chars, bidi overrides, bidi formatting,
#             tag characters, RTL scripts, emoji ZWJ ranges, homoglyphs

# --- Zero-Width Characters (invisible, used for obfuscation) ---

[[rules]]
id = "zw-space"
match_type = "literal"
source = "​"
target = ""
description = "Zero-width space"
group = "zero_width"

[[rules]]
id = "zw-non-joiner"
match_type = "literal"
source = "‌"
target = ""
description = "Zero-width non-joiner"
group = "zero_width"

[[rules]]
id = "zw-joiner"
match_type = "literal"
source = "‍"
target = ""
description = "Zero-width joiner"
group = "zero_width"

[[rules]]
id = "zw-no-break-space"
match_type = "literal"
source = "﻿"
target = ""
description = "Zero-width no-break space / BOM"
group = "zero_width"

[[rules]]
id = "zw-word-joiner"
match_type = "literal"
source = "⁠"
target = ""
description = "Word joiner"
group = "zero_width"

[[rules]]
id = "zw-function-application"
match_type = "literal"
source = "⁡"
target = ""
description = "Function application"
group = "zero_width"

[[rules]]
id = "zw-invisible-times"
match_type = "literal"
source = "⁢"
target = ""
description = "Invisible times"
group = "zero_width"

[[rules]]
id = "zw-invisible-separator"
match_type = "literal"
source = "⁣"
target = ""
description = "Invisible separator"
group = "zero_width"

[[rules]]
id = "zw-invisible-plus"
match_type = "literal"
source = "⁤"
target = ""
description = "Invisible plus"
group = "zero_width"

# --- Bidi Override Characters (dangerous, can reverse text display) ---

[[rules]]
id = "bidi-rtl-override"
match_type = "literal"
source = "‮"
target = ""
description = "Right-to-left override"
group = "bidi_override"

[[rules]]
id = "bidi-ltr-override"
match_type = "literal"
source = "‭"
target = ""
description = "Left-to-right override"
group = "bidi_override"

# --- Bidi Formatting Characters ---

[[rules]]
id = "bidi-ltr-embedding"
match_type = "literal"
source = "‪"
target = ""
description = "Left-to-right embedding"
group = "bidi_formatting"

[[rules]]
id = "bidi-rtl-embedding"
match_type = "literal"
source = "‫"
target = ""
description = "Right-to-left embedding"
group = "bidi_formatting"

[[rules]]
id = "bidi-pop-directional"
match_type = "literal"
source = "‬"
target = ""
description = "Pop directional formatting"
group = "bidi_formatting"

[[rules]]
id = "bidi-ltr-mark"
match_type = "literal"
source = "‎"
target = ""
description = "Left-to-right mark"
group = "bidi_formatting"

[[rules]]
id = "bidi-rtl-mark"
match_type = "literal"
source = "‏"
target = ""
description = "Right-to-left mark"
group = "bidi_formatting"

# --- Tag Character Range (used for invisible tagging attacks) ---

[[rules]]
id = "tag-characters"
match_type = "range"
start = 917504
end = 917631
description = "Tag character range (U+E0000-U+E007F)"

# --- RTL Script Ranges (for mixed-script detection) ---

[[rules]]
id = "rtl-hebrew"
match_type = "range"
start = 0x0590
end = 0x05FF
description = "Hebrew script range"
group = "rtl_scripts"

[[rules]]
id = "rtl-arabic"
match_type = "range"
start = 0x0600
end = 0x06FF
description = "Arabic script range"
group = "rtl_scripts"

[[rules]]
id = "rtl-syriac"
match_type = "range"
start = 0x0700
end = 0x074F
description = "Syriac script range"
group = "rtl_scripts"

[[rules]]
id = "rtl-thaana"
match_type = "range"
start = 0x0780
end = 0x07BF
description = "Thaana script range"
group = "rtl_scripts"

[[rules]]
id = "rtl-nko"
match_type = "range"
start = 0x07C0
end = 0x07FF
description = "NKo script range"
group = "rtl_scripts"

[[rules]]
id = "rtl-samaritan"
match_type = "range"
start = 0x0800
end = 0x083F
description = "Samaritan script range"
group = "rtl_scripts"

# --- Emoji ZWJ Ranges (for emoji-based obfuscation) ---

[[rules]]
id = "emoji-symbols"
match_type = "range"
start = 0x1F300
end = 0x1F9FF
description = "Emoji and symbols range"
group = "emoji_zwj"

[[rules]]
id = "emoji-misc-symbols"
match_type = "range"
start = 0x2600
end = 0x26FF
description = "Miscellaneous symbols range"
group = "emoji_zwj"

[[rules]]
id = "emoji-dingbats"
match_type = "range"
start = 0x2700
end = 0x27BF
description = "Dingbats range"
group = "emoji_zwj"

[[rules]]
id = "emoji-variation-selectors"
match_type = "range"
start = 0xFE00
end = 0xFE0F
description = "Variation selectors range"
group = "emoji_zwj"

