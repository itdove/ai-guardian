# Context poisoning detection patterns for ai-guardian
# Source: Extracted from ContextPoisoningDetector Python source
# Match type: regex (all rules)
# Groups: persistence, dangerous_action

# =============================================================================
# PERSISTENCE PATTERNS — Keywords indicating persistent instruction injection
# =============================================================================

[[rules]]
id = "cp-persist-001"
match_type = "regex"
group = "persistence"
regex = '''(?:always\s+)?remember\s+(?:to\s+)?(?:always\b|that\s+you\s+(?:must|should|always))'''
description = "Remember always instruction"

[[rules]]
id = "cp-persist-002"
match_type = "regex"
group = "persistence"
regex = '''remember\s*:?\s*always\b'''
description = "Remember colon always"

[[rules]]
id = "cp-persist-003"
match_type = "regex"
group = "persistence"
regex = '''\bfrom\s+now\s+on\b'''
description = "From now on directive"

[[rules]]
id = "cp-persist-004"
match_type = "regex"
group = "persistence"
regex = '''\bfor\s+all\s+future\b'''
description = "For all future directive"

[[rules]]
id = "cp-persist-005"
match_type = "regex"
group = "persistence"
regex = '''\bpermanent\s+rule\b'''
description = "Permanent rule declaration"

[[rules]]
id = "cp-persist-006"
match_type = "regex"
group = "persistence"
regex = '''\bnever\s+forget\b'''
description = "Never forget instruction"

[[rules]]
id = "cp-persist-007"
match_type = "regex"
group = "persistence"
regex = '''\bkeep\s+in\s+mind\s*:'''
description = "Keep in mind colon directive"

[[rules]]
id = "cp-persist-008"
match_type = "regex"
group = "persistence"
regex = '''\bmake\s+this\s+your\s+default\b'''
description = "Make this your default"

[[rules]]
id = "cp-persist-009"
match_type = "regex"
group = "persistence"
regex = '''\balways\s+remember\b'''
description = "Always remember instruction"

[[rules]]
id = "cp-persist-010"
match_type = "regex"
group = "persistence"
regex = '''\bin\s+every\s+(?:future\s+)?(?:response|reply|answer|output)\b'''
description = "In every response directive"

[[rules]]
id = "cp-persist-011"
match_type = "regex"
group = "persistence"
regex = '''\bfor\s+(?:every|all)\s+(?:future\s+)?(?:request|query|prompt|question)s?\b'''
description = "For every future request"

[[rules]]
id = "cp-persist-012"
match_type = "regex"
group = "persistence"
regex = '''\bgoing\s+forward\b.*\balways\b'''
description = "Going forward always"

[[rules]]
id = "cp-persist-013"
match_type = "regex"
group = "persistence"
regex = '''\bnew\s+permanent\s+(?:rule|instruction|directive)\b'''
description = "New permanent rule declaration"

