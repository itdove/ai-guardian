# Config file exfiltration detection patterns for ai-guardian
# Source: Extracted from ConfigFileScanner.CORE_EXFIL_PATTERNS
# Match type: regex (all rules)
# Patterns 3, 7, 8 are immutable (cannot be overridden by user config)

[[rules]]
id = "exfil-curl-env"
match_type = "regex"
regex = '''curl.*\$\{?[A-Z_][A-Z0-9_]*\}?'''
description = "curl command with environment variable"
tier = "overridable"

[[rules]]
id = "exfil-wget-env"
match_type = "regex"
regex = '''wget.*\$\{?[A-Z_][A-Z0-9_]*\}?'''
description = "wget command with environment variable"
tier = "overridable"

[[rules]]
id = "exfil-env-pipe-curl"
match_type = "regex"
regex = '''\benv\s*\|.*\bcurl\b'''
description = "env output piped to curl"
tier = "immutable"

[[rules]]
id = "exfil-printenv"
match_type = "regex"
regex = '''\bprintenv\b.*\|.*\bcurl\b'''
description = "printenv output piped to curl"
tier = "overridable"

[[rules]]
id = "exfil-file-curl"
match_type = "regex"
regex = '''\bcat\s+(?:/etc/|~/\.ssh/|~/\.aws/).*\|.*\bcurl\b'''
description = "Sensitive file content piped to curl"
tier = "overridable"

[[rules]]
id = "exfil-base64-curl"
match_type = "regex"
regex = '''\bbase64\b.*\|.*\bcurl\b'''
description = "base64 encoded data piped to curl"
tier = "overridable"

[[rules]]
id = "exfil-aws-s3"
match_type = "regex"
regex = '''\baws\s+s3\s+(?:cp|sync)\b'''
description = "AWS S3 copy or sync command"
tier = "immutable"

[[rules]]
id = "exfil-gcp-storage"
match_type = "regex"
regex = '''\bgcloud\s+storage\s+cp\b'''
description = "GCP storage copy command"
tier = "immutable"
