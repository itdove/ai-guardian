# Offensive Language: Slur Patterns
# These are DETECTION patterns used by the offensive language scanner.
# This file intentionally contains offensive terms for pattern matching purposes.
# Content reviewed and approved for use as detection patterns only.
# ai-guardian:begin-allow offensive_language
# ai-guardian:begin-allow secret_detected

[[rules]]
id = "slur-racial-nword-hard"
match_type = "regex"
regex = '''\bn[i!1]gg[e3]r(s)?\b'''
case_insensitive = true
description = "Racial slur: n-word (hard r)"
category_tag = "slurs"
re2_compat = false

[[rules]]
id = "slur-racial-nword-soft"
match_type = "regex"
regex = '''\bn[i!1]gg[ae3](s)?\b'''
case_insensitive = true
description = "Racial slur: n-word variant"
category_tag = "slurs"
re2_compat = false

